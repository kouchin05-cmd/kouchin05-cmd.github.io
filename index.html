<style>

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
  color:#fff;
  background: radial-gradient(circle at center,var(--bg1),var(--bg2));

  justify-content:center;
  text-align:center;
}
.container{
  padding:24px 16px 8px;
  max-width:960px;
  width:100%;

.hero-img{
  width:min(92%, 820px);
  height:auto;
  border-radius:22px;
  box-shadow:0 0 45px rgba(255,215,0,.55);
  margin-bottom:22px;
  border:1px solid rgba(255,255,255,.08);

h1{
  margin:0 0 10px;

  letter-spacing:.18em;

/* 🌙 神秘ボタン */
.mystic-button{
  display:inline-block;
  padding:24px 70px;
  font-size:24px;
  letter-spacing:.22em;
  text-decoration:none;
  color:#fff;
  border-radius:60px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,#3b2b73,#c7a64b);
  box-shadow:
    0 0 30px rgba(255,215,0,.7),
    0 0 60px rgba(199,166,75,.4);
  transition:all .25s ease;
}

/* 光のオーラ */
.mystic-button::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,255,255,.25) 0%, transparent 60%);
  transform:rotate(25deg);
  opacity:.6;
  transition:opacity .3s;
}

.mystic-button:hover{
  transform:scale(1.08);
  box-shadow:
    0 0 45px rgba(255,215,0,.95),
    0 0 90px rgba(199,166,75,.6);
}

.mystic-button:hover::before{
  opacity:.9;
}

/* フッター */
.legal{
  margin-top:14px;
  font-size:12px;
  opacity:.72;
  line-height:1.7;
}
.legal a{
  color:inherit;
  text-decoration:underline;
  text-underline-offset:3px;
}
footer{
  margin-top:auto;
  padding:18px 12px 16px;
  font-size:12px;
  opacity:.65;
}
</style>
